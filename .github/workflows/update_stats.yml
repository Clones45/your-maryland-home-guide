name: Update SEO & Review Stats

on:
  schedule:
    # Runs daily at 06:00 UTC
    - cron: "0 6 * * *"
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-seo-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install scrapling playwright

      # ── 4. Install Playwright browser ─────────────────────────────────────
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      # ── 5. Run the scraper ────────────────────────────────────────────────
      - name: Fetch GBP & SEO data
        run: python scripts/fetch_gbp_data.py
        # Continue even if scrape partially fails — the script handles fallback
        continue-on-error: true

      # ── 6. Commit updated JSON ────────────────────────────────────────────
      - name: Commit seo_stats.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/seo_stats.json
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update seo_stats.json [skip ci]"
            git push
          fi
